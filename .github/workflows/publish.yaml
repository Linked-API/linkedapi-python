name: PR Merged -> main

on:
  push:
    branches: ['main']

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy linkedapi

      - name: Test
        run: pytest -q

  publish:
    needs: [quality]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check if version changed
        id: version-check
        run: |
          PACKAGE_NAME=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['name'])")
          PACKAGE_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          PYPI_VERSION=$(curl -fsSL "https://pypi.org/pypi/${PACKAGE_NAME}/json" | python -c "import json,sys; print(json.load(sys.stdin)['info']['version'])" 2>/dev/null || echo "none")
          if [ "$PACKAGE_VERSION" != "$PYPI_VERSION" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $PYPI_VERSION -> $PACKAGE_VERSION"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged: $PACKAGE_VERSION"
          fi

      - name: Build distributions
        if: steps.version-check.outputs.should_publish == 'true'
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        if: steps.version-check.outputs.should_publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
